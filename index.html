<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000814;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#090912;
border-radius:30px;
padding:35px 25px;
text-align:center;
box-shadow:0 0 40px rgba(255,215,0,0.15);
border:1px solid rgba(255,215,0,0.1);
}

.title{
font-size:34px;
font-weight:bold;
color:#ffe680;
margin-bottom:30px;
text-shadow:0 0 15px gold;
}

.logo-wrap{
position:relative;
width:190px;
height:190px;
margin:auto;
display:flex;
justify-content:center;
align-items:center;
}

.logo-wrap::before{
content:'';
position:absolute;
width:200px;
height:200px;
border-radius:50%;
border:5px solid transparent;
border-top:5px solid gold;
border-bottom:5px solid gold;
animation:spin 4s linear infinite;
box-shadow:0 0 30px gold;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.logo{
width:165px;
height:165px;
border-radius:50%;
object-fit:cover;
border:4px solid gold;
box-shadow:0 0 25px gold;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0);
}
}

.subtitle{
margin-top:25px;
font-size:20px;
color:#d9d9d9;
font-weight:bold;
}

.btn{
margin-top:40px;
display:inline-block;
width:100%;
background:linear-gradient(45deg,#00ff66,#00cc44);
color:white;
padding:22px;
font-size:24px;
font-weight:bold;
border-radius:18px;
text-decoration:none;
box-shadow:0 0 30px rgba(34,216,95,0.7);
animation:pulse 1.5s infinite;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

@keyframes pulse{
0%{
transform:scale(1);
box-shadow:0 0 15px rgba(34,216,95,0.5);
}
50%{
transform:scale(1.05);
box-shadow:0 0 40px rgba(34,216,95,1);
}
100%{
transform:scale(1);
box-shadow:0 0 15px rgba(34,216,95,0.5);
}
}

.features{
margin-top:35px;
display:flex;
flex-direction:column;
gap:14px;
font-size:18px;
color:white;
font-weight:bold;
}

.risk{
margin-top:25px;
font-size:14px;
color:#777;
}
</style>

</div>

Trade responsibly. Market involves risk.
</div>

</div>
